spring.application.name=debezium-orders-consumer

# Server Configuration
server.port=8091

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Configuration
spring.kafka.consumer.group-id=debezium-orders-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest

# Schema Registry (required for Avro deserialization)
spring.kafka.consumer.properties.schema.registry.url=http://localhost:8081

# Logging
logging.level.com.kafka.connect.debezium=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=INFO

